name: Update Generation Mix Data

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pandas duckdb

      - name: Run blue-green update
        run: python update_current_year.py

      - name: Commit updated data to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generation_mix_*.csv data/neso-uk-electricity-generation-mix.parquet
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "Update generation mix data $(date -u +%Y-%m-%d)" && \
            git push

