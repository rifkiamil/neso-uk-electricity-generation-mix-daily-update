name: Update Generation Mix Data

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pandas duckdb

      - name: Run daily update
        run: python update_current_year.py

      - name: Upload data artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: generation-mix-data-${{ github.run_id }}
          path: |
            data/generation_mix_*.csv
            data/neso-uk-electricity-generation-mix.parquet
          retention-days: 90

